{% load static %}

{% with article=piece %}
<div class="index-article-card{% if centered %} centered{% endif %}">
    <h2>
        <a href="{% url 'article' article.slug %}">
            {{ article.title }}
        </a>
    </h2>
    
    {% include "./article_byline.html" %}

    {% load tag %}
    {{article.body_html|truncatewords_html:50|safe}}
    
    <p><a href="{% url 'article' article.slug %}">Read more</a></p>
</div>
{% endwith %}
